name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (Java 17)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify project
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Verify dashboard session fixture
        run: |
          java -Dsession.report=/tmp/limitforge-session.json -jar target/limitforge-engine-1.0.0.jar
          cmp /tmp/limitforge-session.json ui/public/session.json

      - name: Smoke-test benchmark harness
        run: |
          java -Dlogback.configurationFile=logback-benchmark.xml \
            -cp target/limitforge-engine-1.0.0.jar \
            com.trading.benchmark.MatchingEngineBenchmark \
            --orders 1000 --warmup 1 --iterations 2

  dashboard:
    name: Build and test dashboard (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ui

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint dashboard
        run: npm run lint

      - name: Build and test dashboard
        run: npm test
