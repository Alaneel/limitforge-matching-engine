# QuickFIX/J Server Configuration

[default]
FileStorePath=target/fix-store
FileLogPath=target/fix-logs
ConnectionType=acceptor
StartTime=00:00:00
EndTime=23:59:59
HeartBtInt=30
ValidateUserDefinedFields=N
ValidateFieldsOutOfOrder=N
ValidateFieldsHaveValues=N
UseDataDictionary=Y
DataDictionary=FIX44.xml
ResetOnLogon=Y
ResetOnLogout=Y
ResetOnDisconnect=Y

[session]
BeginString=FIX.4.4
SenderCompID=LIMITFORGE
TargetCompID=CLIENT
SocketAcceptPort=9876
